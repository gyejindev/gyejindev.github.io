<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Web-Practice</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/main.css">
</head>

<body>
    <header>
        <h1>Jogyejin의 코드 리뷰 1차 - 태그 예제</h1>
        <img src="https://i.ibb.co/bb7kRP4/default-avatar.jpg" alt="default-avatar" border="0" width="100">
    </header>
    <nav>
        <ul>
            <li><a href="index.html" target="_self">로그인폼 예제</a></li>
            <li><a href="main.html" target="_self">태그 예제</a></li>
            <li><a href="animation.html" target="_self">애니메이션 예제</a></li>
            <li><a href="html_section.html" target="_blank">html5 섹션 레이아웃 예제</a></li>
            <li><a href="div_section.html" target="_blank">div 섹션 레이아웃 예제</a></li>
        </ul>
        
    </nav>

    <div class="container">
        <div class="content1">

            <div class="block">
                <h3>비디오</h3>
                <!--비디오 자동 재생-->
                <video src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
                    height="200" width="300" controls autoplay>
                </video>
                <hr>
            </div>

            <div class="block">
                <h3>음악</h3>
                <!--음악 자동 재생-->
                <br>
                <audio src="https://ccrma.stanford.edu/~jos/mp3/harpsi-cs.mp3" controls autoplay></audio>
                <hr>
            </div>

            <div class="block">
                <h3>폰트 변경</h3>
                <!-- 폰트 변경 -->
                <p class="fontdiv">구글 폰트체로 변신</h1>
                <hr>
            </div>

            <div class="block">
                <h3>이미지 넣기</h3>
                <!-- 이미지 넣기 -->
                <img src="https://picsum.photos/200/300?random=1" alt="My Image">
                <hr>
            </div>

        </div>
        <div class="content2">
            <div class="block">
                <h3>필터 기능 이용하기</h3>
                <!-- 필터 기능 -->
                <img src="https://picsum.photos/200/200?random=1" alt="2" class="filter">
                <hr>
            </div>

            <div class="block">
                <!-- 목차 기능 -->
                <h3>목차 만들기</h3>
                <ol>
                    <li>첫번째 목차</li>
                    <li>두번째 목차</li>
                    <li>세번째 목차</li>
                </ol>
                <hr>
            </div>
            <div class="block">
                
            </div>
            box-shadow: 10px 5px 5px red;
        </div>
    </div>
</body>

</html>
