<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Web-Practice</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/53a8c415f1.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <header>
        <h1>Jogyejin의 코드 리뷰 1차 - 로그인 화면</h1>
        <img src="https://i.ibb.co/bb7kRP4/default-avatar.jpg" alt="default-avatar" border="0" width="100">
    </header>
    <div class="wrap">
        <div class="login">
            <h2>로그인</h2>
            <div class="login_sns">
            <li><a href=""><i class="fab fa-instagram"></i></a></li>
            <li><a href=""><i class="fab fa-facebook-f"></i></a></li>
            <li><a href=""><i class="fab fa-twitter"></i></a></li>
            </div>
            <div class="login_id">
                <h4>아이디</h4>
                <input type="email" name="" id="id" placeholder="Email">
            </div>
            <div class="login_pw">
                <h4>비밀번호</h4>
                <input type="password" name="" id="password" placeholder="Password">
            </div>
            <div class="login_etc">
                <div class="checkbox">
                <input type="checkbox" name="" id=""> 아이디 저장
                </div>
                <div class="forgot_pw">
                <a href="">비밀번호 분실</a>
            </div>
            </div>
            <div class="submit">
                <input type="submit" value="로그인" id="login">
            </div>
            <!-- <button id="login" class="account">login</button>             -->
            <script src="./script/script.js"></script>
        </div>
    </div>
</body>
</html>
